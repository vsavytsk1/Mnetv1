<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sacred Math Tree v1.3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090e;color:#dce4f0;font-family:ui-monospace,"SF Mono",Menlo,monospace;
  overflow:hidden;height:100vh;width:100vw}

/* FLAT plane ? just a big div we pan/zoom, NO perspective NO tilt */
#plane{position:absolute;transform-origin:0 0}

/* EQUATION BOXES */
.eq{position:absolute;background:rgba(8,11,18,0.94);
  border:1.5px solid rgba(0,212,255,0.3);border-radius:5px;
  padding:11px 18px;cursor:pointer;min-width:100px;text-align:center;
  opacity:0;transform:scale(0.5);pointer-events:auto;
  transition:opacity 0.5s ease-out,transform 0.45s ease-out,border-color 0.3s,box-shadow 0.3s}
.eq.show{opacity:1;transform:scale(1)}
.eq:hover{border-color:#00d4ff;box-shadow:0 0 22px rgba(0,212,255,0.12)}
.eq.t-root{border-color:rgba(255,215,0,0.5)}
.eq.t-root:hover{border-color:#ffd700;box-shadow:0 0 35px rgba(255,215,0,0.18)}
.eq.t-tool{border-color:rgba(176,102,255,0.4)}
.eq.t-tool:hover{border-color:#b066ff;box-shadow:0 0 20px rgba(176,102,255,0.15)}
.eq.t-result{border-color:rgba(74,222,128,0.4)}
.eq.t-result:hover{border-color:#4ade80;box-shadow:0 0 20px rgba(74,222,128,0.15)}
.eq.t-dead{border-color:rgba(248,113,113,0.3);opacity:0.5!important}
.eq .tag{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;opacity:0.4}
.eq .tag.gold{color:#ffd700}.eq .tag.purp{color:#b066ff}
.eq .tag.grn{color:#4ade80}.eq .tag.red{color:#f87171}
.eq .katex{font-size:1.05em}
.eq .sub{font-size:9px;opacity:0.28;margin-top:7px;font-style:italic;max-width:260px}

/* FLOATING OP BUTTONS */
.op-btn{position:absolute;background:rgba(176,102,255,0.06);
  border:1px solid rgba(176,102,255,0.35);border-radius:14px;
  padding:5px 12px;font-size:10px;color:#b066ff;cursor:pointer;
  pointer-events:auto;white-space:nowrap;
  opacity:0;transform:scale(0.3);
  transition:opacity 0.5s,transform 0.4s ease-out,border-color 0.2s,background 0.2s}
.op-btn.show{opacity:1;transform:scale(1)}
.op-btn:hover{border-color:#b066ff;background:rgba(176,102,255,0.15);
  box-shadow:0 0 14px rgba(176,102,255,0.2)}
.op-btn .cost{color:#ffd700;font-size:9px;margin-left:4px}

/* LINKS ? SVG canvas same size as plane */
svg.lk{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
svg.lk path{fill:none;stroke-width:1.5}

/* SPARKLE */
@keyframes sparkle{0%{box-shadow:0 0 20px rgba(255,215,0,0.06)}
  50%{box-shadow:0 0 40px rgba(255,215,0,0.14),0 0 80px rgba(255,215,0,0.04)}
  100%{box-shadow:0 0 20px rgba(255,215,0,0.06)}}
.eq.t-root.show{animation:sparkle 3s ease-in-out infinite}

/* GACHA HUD */
#ghud{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:30;
  display:flex;gap:18px;align-items:center;font-size:12px}
.gem{display:flex;align-items:center;gap:5px}
.gem .ct{color:#ffd700;font-weight:bold;font-size:15px}
.tok-pop{position:fixed;pointer-events:none;z-index:40;font-size:18px;font-weight:bold;
  color:#ffd700;animation:tokfly 1.2s ease-out forwards}
@keyframes tokfly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
#combo{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:25;
  font-size:22px;font-weight:bold;opacity:0;transition:opacity 0.3s;
  text-shadow:0 0 24px rgba(255,215,0,0.3)}
#shud{position:fixed;top:12px;left:12px;z-index:20;font-size:11px;opacity:0.4}
#shud div{margin:3px 0}#shud .v{color:#00d4ff}
#ver{position:fixed;top:12px;right:12px;z-index:20;font-size:9px;
  letter-spacing:0.14em;text-transform:uppercase;opacity:0.22}
#bot{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:20;
  font-size:10px;opacity:0.22}
</style>
</head>
<body>

<div id="ghud">
  <div class="gem">&#9670; <span class="ct" id="g-tok">3</span></div>
  <div style="color:#b066ff;font-size:11px">XP <span id="g-xp">0</span></div>
  <div style="color:#f97316;font-size:11px">&#128293; <span id="g-str">0</span></div>
</div>
<div id="combo"></div>
<div id="shud"><div>nodes <span class="v" id="h-n">1</span></div>
  <div>depth <span class="v" id="h-d">0</span></div></div>
<div id="ver">v1.3</div>
<div id="bot">click ops &middot; scroll zoom &middot; drag pan</div>

<div id="plane"><svg class="lk" id="lksvg"></svg></div>

<script>
// ?????????????????????????????????????????????
// DATA
// ?????????????????????????????????????????????
const T={id:"eq0",tag:"START",type:"root",
  latex:"\\lim_{x \\to 0} \\frac{\\sin x}{x}",
  sub:"what tools can you apply?",cost:0,xp:0,
  ch:[
    {id:"t1",tag:"DIRECT SUB",type:"tool",
     latex:"\\frac{\\sin(0)}{0} = \\frac{0}{0}",
     sub:"indeterminate! need another way",cost:1,xp:5,
     ch:[{id:"t1d",tag:"DEAD END",type:"dead",
       latex:"\\frac{0}{0}\\;\\text{undefined}",
       sub:"now you KNOW. that is data.",cost:0,xp:10,ch:[]}]},
    {id:"t2",tag:"L\u2019H\u00D4PITAL",type:"tool",
     latex:"\\overset{\\text{L\u2019H}}{=}\\lim_{x\\to 0}\\frac{\\cos x}{1}",
     sub:"differentiate top & bottom",cost:1,xp:5,
     ch:[{id:"t2r",tag:"EVALUATE",type:"result",
       latex:"\\frac{\\cos 0}{1}=\\boxed{1}",
       sub:"why does this rule work?",cost:1,xp:25,
       ch:[{id:"t2r2",tag:"THE REASON",type:"result",
         latex:"\\frac{f}{g}\\approx\\frac{f'(a)(x-a)}{g'(a)(x-a)}=\\frac{f'(a)}{g'(a)}",
         sub:"near a, functions ARE their derivatives",cost:1,xp:40,ch:[]}]}]},
    {id:"t3",tag:"SQUEEZE",type:"tool",
     latex:"\\cos x \\leq \\frac{\\sin x}{x} \\leq 1",
     sub:"trap between two known limits",cost:1,xp:5,
     ch:[{id:"t3r",tag:"SQUEEZED",type:"result",
       latex:"\\lim\\cos x=1,\\;\\lim 1=1\\;\\Rightarrow\\;\\boxed{1}",
       sub:"both = 1. middle has no choice.",cost:1,xp:30,ch:[]}]},
    {id:"t4",tag:"TAYLOR SERIES",type:"tool",
     latex:"\\sin x=x-\\tfrac{x^3}{6}+\\tfrac{x^5}{120}-\\cdots",
     sub:"expand then divide by x",cost:2,xp:10,
     ch:[{id:"t4r",tag:"DIVIDE",type:"result",
       latex:"1-\\tfrac{x^2}{6}+\\tfrac{x^4}{120}-\\cdots\\;\\to\\;\\boxed{1}",
       sub:"all x terms vanish. only 1 survives.",cost:1,xp:50,ch:[]}]}
  ]};

// ?????????????????????????????????????????????
// STATE
// ?????????????????????????????????????????????
let tokens=3,xp=0,streak=0,combo=0,comboT=null;
let opened=new Set(["eq0"]);

function flyPop(el,txt,col){let r=el.getBoundingClientRect();let p=document.createElement('div');
  p.className='tok-pop';p.style.color=col||'#ffd700';p.textContent=txt;
  p.style.left=r.left+r.width/2-20+'px';p.style.top=r.top-10+'px';
  document.body.appendChild(p);setTimeout(()=>p.remove(),1300)}
function addTok(n,el){tokens+=n;if(el)flyPop(el,'+'+n+' \u2666');updH()}
function addXP(n,el){xp+=n;if(el)flyPop(el,'+'+n+' XP','#b066ff');updH()}
function bumpStr(el){streak++;combo++;let c=document.getElementById('combo');
  if(combo>=2){c.textContent=combo+'x COMBO';c.style.opacity='1';
    c.style.color=combo>=5?'#ffd700':combo>=3?'#f97316':'#b066ff'}
  clearTimeout(comboT);comboT=setTimeout(()=>{combo=0;c.style.opacity='0'},3500);
  if(streak===3)addTok(2,el);if(streak===5)addTok(3,el);if(streak===8)addTok(5,el)}
function updH(){document.getElementById('g-tok').textContent=tokens;
  document.getElementById('g-xp').textContent=xp;
  document.getElementById('g-str').textContent=streak}

// ?????????????????????????????????????????????
// LAYOUT ? flat, downward
// ?????????????????????????????????????????????
let items=[];
const CX=2000,CY=200,DY=320,XSP=420;

function layout(n,d,xc,px,py){
  let nx=px!==null?xc:CX, ny=py!==null?py+DY:CY;
  items.push({n,x:nx,y:ny,d});
  if(opened.has(n.id)&&n.ch&&n.ch.length){
    let c=n.ch.length,sp=XSP*Math.min(c,5);
    let sx=nx-sp/2,st=c>1?sp/(c-1):0;
    for(let i=0;i<c;i++) layout(n.ch[i],d+1,c===1?nx:sx+st*i,nx,ny);
  }
}

// ?????????????????????????????????????????????
// RENDER
// ?????????????????????????????????????????????
const plane=document.getElementById('plane');
const lksvg=document.getElementById('lksvg');

function render(){
  items=[];layout(T,0,CX,null,null);
  plane.querySelectorAll('.eq,.op-btn').forEach(e=>e.remove());
  let lk={};items.forEach(i=>lk[i.n.id]=i);

  // compute plane size to fit
  let maxX=0,maxY=0;items.forEach(i=>{if(i.x+200>maxX)maxX=i.x+200;if(i.y+200>maxY)maxY=i.y+200});
  plane.style.width=maxX+'px';plane.style.height=maxY+'px';
  lksvg.setAttribute('viewBox','0 0 '+maxX+' '+maxY);
  lksvg.style.width=maxX+'px';lksvg.style.height=maxY+'px';

  // links ? smooth curves downward
  let svg='';
  for(let it of items){
    let pid=findPid(T,it.n.id,null);
    if(pid&&lk[pid]){
      let p=lk[pid],x1=p.x,y1=p.y+45,x2=it.x,y2=it.y-45,my=(y1+y2)/2;
      let col=it.n.type==='dead'?'rgba(248,113,113,0.2)':
              it.n.type==='result'?'rgba(74,222,128,0.25)':'rgba(0,212,255,0.2)';
      svg+='<path d="M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2+'" stroke="'+col+'"/>';
    }
  }
  lksvg.innerHTML=svg;

  // draw nodes
  for(let it of items){
    let n=it.n,box=document.createElement('div');
    box.className='eq t-'+n.type;
    box.style.left=(it.x-150)+'px';box.style.top=(it.y-38)+'px';
    box.style.maxWidth='300px';box.dataset.id=n.id;
    let tc=n.type==='root'?'gold':n.type==='tool'?'purp':n.type==='result'?'grn':'red';
    box.innerHTML='<div class="tag '+tc+'">'+n.tag+'</div><div class="ltx"></div>'+
      (n.sub?'<div class="sub">'+n.sub+'</div>':'');
    plane.appendChild(box);
    try{katex.render(n.latex,box.querySelector('.ltx'),{throwOnError:false,displayMode:true})}catch(e){}
    let delay=it.d*80;
    setTimeout(()=>box.classList.add('show'),delay+50);

    // collapse on click if all children open
    if(opened.has(n.id)&&n.ch&&n.ch.length&&!n.ch.some(c=>!opened.has(c.id))){
      box.addEventListener('click',e=>{e.stopPropagation();
        if(n.id!=='eq0'){opened.delete(n.id);collAll(n);render()}});
    }

    // FLOATING OP BUTTONS for unopened children
    if(opened.has(n.id)&&n.ch){
      let un=n.ch.filter(c=>!opened.has(c.id));
      if(un.length){
        let total=un.length,spread=total*110;
        let sx=it.x-spread/2+55;
        un.forEach((ch,i)=>{
          let bx=total===1?it.x:sx+i*110;
          let by=it.y+70;
          let btn=document.createElement('div');btn.className='op-btn';
          btn.style.left=(bx-55)+'px';btn.style.top=by+'px';
          let costTxt=ch.cost>0?' <span class="cost">\u2666'+ch.cost+'</span>':'';
          btn.innerHTML=ch.tag+costTxt;
          plane.appendChild(btn);
          setTimeout(()=>btn.classList.add('show'),delay+200+i*80);
          btn.addEventListener('click',e=>{e.stopPropagation();
            if(ch.cost>0&&tokens<ch.cost){
              btn.style.borderColor='#f87171';btn.style.boxShadow='0 0 16px rgba(248,113,113,0.25)';
              setTimeout(()=>{btn.style.borderColor='';btn.style.boxShadow=''},500);return}
            tokens-=ch.cost;opened.add(ch.id);addXP(ch.xp,btn);bumpStr(btn);
            if(ch.type==='result'||ch.type==='dead')addTok(1,btn);updH();render()});
        });
      }
    }
  }
  document.getElementById('h-n').textContent=items.length;
  document.getElementById('h-d').textContent=Math.max(...items.map(i=>i.d));
}

function collAll(n){if(n.ch)n.ch.forEach(c=>{opened.delete(c.id);collAll(c)})}
function findPid(t,tid,pid){if(t.id===tid)return pid;
  if(t.ch)for(let c of t.ch){let f=findPid(c,tid,t.id);if(f!==null)return f}return null}

// ?????????????????????????????????????????????
// PAN + ZOOM ? flat, no tilt, centered
// ?????????????????????????????????????????????
let panX=0,panY=0,zm=0.65;

function centerOnRoot(){
  panX=window.innerWidth/2-CX*zm;
  panY=80;
  upT();
}
function upT(){
  plane.style.transform='translate('+panX+'px,'+panY+'px) scale('+zm+')';
}

let drag=false,lm={x:0,y:0};
document.addEventListener('pointerdown',e=>{
  if(e.target.closest('.eq,.op-btn'))return;
  drag=true;lm={x:e.clientX,y:e.clientY}});
document.addEventListener('pointermove',e=>{
  if(!drag)return;
  panX+=e.clientX-lm.x;panY+=e.clientY-lm.y;
  lm={x:e.clientX,y:e.clientY};upT()});
document.addEventListener('pointerup',()=>{drag=false});
document.addEventListener('wheel',e=>{e.preventDefault();
  // zoom toward mouse position
  let rect=plane.getBoundingClientRect();
  let mx=e.clientX,my=e.clientY;
  let factor=e.deltaY>0?0.92:1.08;
  let newZm=Math.max(0.15,Math.min(2.5,zm*factor));
  // adjust pan so point under mouse stays fixed
  panX=mx-(mx-panX)*(newZm/zm);
  panY=my-(my-panY)*(newZm/zm);
  zm=newZm;upT();
},{passive:false});

centerOnRoot();
render();
</script>
</body>
</html>
