<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sacred Math Tree v1.6</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d14;color:#e8ecf4;font-family:ui-monospace,"SF Mono",Menlo,monospace;
  overflow:hidden;height:100vh;width:100vw}
#plane{position:absolute;transform-origin:0 0}

.eq{position:absolute;background:rgba(14,17,28,0.96);
  border:1px solid rgba(100,120,160,0.18);border-radius:6px;
  padding:14px 20px;cursor:pointer;min-width:110px;text-align:center;
  pointer-events:auto;
  transition:left 0.7s cubic-bezier(0.22,1,0.36,1),
             top 0.7s cubic-bezier(0.22,1,0.36,1),
             opacity 0.5s ease-out,border-color 0.3s,box-shadow 0.3s}
.eq.fresh{opacity:0;transform:scale(0.5)}
.eq.show{opacity:1;transform:scale(1);
  transition:left 0.7s cubic-bezier(0.22,1,0.36,1),
             top 0.7s cubic-bezier(0.22,1,0.36,1),
             opacity 0.5s ease-out,transform 0.5s ease-out,
             border-color 0.3s,box-shadow 0.3s}

/* TYPES */
.eq.t-root{border-color:rgba(255,200,60,0.4);background:rgba(18,16,10,0.96)}
.eq.t-root:hover{border-color:rgba(255,215,80,0.6);box-shadow:0 0 30px rgba(255,200,60,0.12)}
.eq.t-tool{border-color:rgba(160,120,255,0.3);background:rgba(16,14,24,0.96)}
.eq.t-tool:hover{border-color:rgba(180,140,255,0.5);box-shadow:0 0 20px rgba(160,120,255,0.1)}
.eq.t-result{border-color:rgba(80,220,140,0.3);background:rgba(10,18,14,0.96)}
.eq.t-result:hover{border-color:rgba(100,240,160,0.5);box-shadow:0 0 20px rgba(80,220,140,0.1)}
.eq.t-dead{border-color:rgba(220,80,80,0.25);background:rgba(20,12,12,0.96)}

/* LOCKED (unopened) ? the ghost */
.eq.locked{opacity:0.25;border-style:dashed;cursor:pointer}
.eq.locked:hover{opacity:0.5;box-shadow:0 0 18px rgba(100,120,160,0.08)}
.eq.locked .lock-icon{font-size:22px;opacity:0.4;margin:6px 0}

/* HOVER TOKEN BADGE ? upper right, only on hover */
.eq .tok-badge{position:absolute;top:-8px;right:-8px;
  background:rgba(14,17,28,0.95);border:1px solid rgba(232,180,76,0.5);
  border-radius:10px;padding:2px 7px;font-size:10px;color:#e8b44c;
  font-weight:600;opacity:0;transform:scale(0.6);pointer-events:none;
  transition:opacity 0.25s,transform 0.2s}
.eq:hover .tok-badge{opacity:1;transform:scale(1)}

.eq .tag{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.eq .tag.gold{color:#e8b44c}.eq .tag.purp{color:#a78bfa}
.eq .tag.grn{color:#6ee7a0}.eq .tag.red{color:#f87171}
.eq .ltx{color:#fff;margin:4px 0}
.eq .ltx .katex{font-size:1.15em;color:#fff}
.eq .sub{font-size:10px;opacity:0.3;margin-top:8px;font-style:italic;color:#8899bb}

svg.lk{position:absolute;top:0;left:0;pointer-events:none}
svg.lk path{fill:none;stroke-width:1.5;
  transition:d 0.7s cubic-bezier(0.22,1,0.36,1)}

@keyframes sparkle{0%{box-shadow:0 0 15px rgba(255,200,60,0.04)}
  50%{box-shadow:0 0 35px rgba(255,200,60,0.12),0 0 70px rgba(255,200,60,0.04)}
  100%{box-shadow:0 0 15px rgba(255,200,60,0.04)}}
.eq.t-root.show{animation:sparkle 3.5s ease-in-out infinite}

@keyframes freezeFlash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
#freeze{position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:50;background:rgba(160,140,255,0.03);opacity:0}
#freeze.flash{animation:freezeFlash 0.6s ease-out}

/* WAVINESS SLIDER */
#wave-ctrl{position:fixed;bottom:14px;right:14px;z-index:30;display:flex;
  align-items:center;gap:8px;font-size:10px;opacity:0.4;transition:opacity 0.3s}
#wave-ctrl:hover{opacity:0.8}
#wave-ctrl input{width:80px;accent-color:#a78bfa}
#wave-ctrl .wlabel{letter-spacing:0.08em;text-transform:uppercase;color:#8899bb}

/* GACHA HUD */
#ghud{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:30;
  display:flex;gap:20px;align-items:center;font-size:13px}
.gem{display:flex;align-items:center;gap:5px}
.gem .ct{color:#e8b44c;font-weight:bold;font-size:16px}
.tok-pop{position:fixed;pointer-events:none;z-index:40;font-size:18px;font-weight:bold;
  color:#e8b44c;animation:tokfly 1.2s ease-out forwards}
@keyframes tokfly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
#combo{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:25;
  font-size:22px;font-weight:bold;opacity:0;transition:opacity 0.3s;
  text-shadow:0 0 20px rgba(255,200,60,0.3)}
#shud{position:fixed;top:14px;left:14px;z-index:20;font-size:11px;opacity:0.35}
#shud div{margin:3px 0}#shud .v{color:#7aa2f7}
#ver{position:fixed;top:14px;right:14px;z-index:20;font-size:9px;
  letter-spacing:0.14em;text-transform:uppercase;opacity:0.2}
</style>
</head>
<body>
<div id="freeze"></div>
<div id="ghud">
  <div class="gem">&#9670; <span class="ct" id="g-tok">3</span></div>
  <div style="color:#a78bfa;font-size:12px">XP <span id="g-xp">0</span></div>
  <div style="color:#f97316;font-size:12px">&#128293;<span id="g-str">0</span></div>
</div>
<div id="combo"></div>
<div id="shud"><div>nodes <span class="v" id="h-n">1</span></div>
  <div>depth <span class="v" id="h-d">0</span></div></div>
<div id="ver">v1.6</div>

<div id="wave-ctrl">
  <span class="wlabel">wave</span>
  <input type="range" id="wslider" min="0" max="100" value="50">
</div>

<div id="plane"><svg class="lk" id="lksvg"></svg></div>

<script>
const T={id:"eq0",tag:"START",type:"root",
  latex:"\\lim_{x \\to 0} \\frac{\\sin x}{x}",
  sub:"click to explore",cost:0,xp:0,
  ch:[
    {id:"t1",tag:"DIRECT SUB",type:"tool",
     latex:"\\frac{\\sin(0)}{0} = \\frac{0}{0}",
     sub:"indeterminate!",cost:1,xp:5,
     ch:[{id:"t1d",tag:"DEAD END",type:"dead",
       latex:"\\frac{0}{0}\\;\\text{undefined}",sub:"now you KNOW.",cost:0,xp:10,ch:[]}]},
    {id:"t2",tag:"L\u2019H\u00D4PITAL",type:"tool",
     latex:"\\overset{\\text{L\u2019H}}{=}\\;\\lim_{x\\to 0}\\frac{\\cos x}{1}",
     sub:"differentiate top & bottom",cost:1,xp:5,
     ch:[{id:"t2r",tag:"EVALUATE",type:"result",
       latex:"\\frac{\\cos 0}{1}=\\boxed{1}",sub:"why does this work?",cost:1,xp:25,
       ch:[{id:"t2r2",tag:"THE REASON",type:"result",
         latex:"\\frac{f}{g}\\approx\\frac{f'(a)(x-a)}{g'(a)(x-a)}=\\frac{f'(a)}{g'(a)}",
         sub:"functions ARE their derivatives near a",cost:1,xp:40,ch:[]}]}]},
    {id:"t3",tag:"SQUEEZE",type:"tool",
     latex:"\\cos x \\leq \\frac{\\sin x}{x} \\leq 1",
     sub:"trap between two known limits",cost:1,xp:5,
     ch:[{id:"t3r",tag:"SQUEEZED",type:"result",
       latex:"\\lim\\cos x=1,\\;\\lim 1=1\\;\\Rightarrow\\;\\boxed{1}",
       sub:"both = 1. no choice.",cost:1,xp:30,ch:[]}]},
    {id:"t4",tag:"TAYLOR",type:"tool",
     latex:"\\sin x = x - \\frac{x^3}{3!}+\\frac{x^5}{5!}-\\cdots",
     sub:"expand then divide",cost:2,xp:10,
     ch:[{id:"t4r",tag:"DIVIDE BY x",type:"result",
       latex:"1 - \\frac{x^2}{6}+\\frac{x^4}{120}-\\cdots\\;\\to\\;\\boxed{1}",
       sub:"only 1 survives.",cost:1,xp:50,ch:[]}]}
  ]};

let tokens=3,xp=0,streak=0,combo=0,comboT=null;
let opened=new Set(["eq0"]);
let revealed=false; // root clicked yet?
let els={};
let waviness=0.5;

document.getElementById('wslider').addEventListener('input',e=>{
  waviness=e.target.value/100;render(false)});

function flyPop(el,txt,col){let r=el.getBoundingClientRect();let p=document.createElement('div');
  p.className='tok-pop';p.style.color=col||'#e8b44c';p.textContent=txt;
  p.style.left=r.left+r.width/2-20+'px';p.style.top=r.top-10+'px';
  document.body.appendChild(p);setTimeout(()=>p.remove(),1300)}
function addTok(n,el){tokens+=n;if(el)flyPop(el,'+'+n+' \u2666');updH()}
function addXP(n,el){xp+=n;if(el)flyPop(el,'+'+n+' XP','#a78bfa');updH()}
function bumpStr(el){streak++;combo++;let c=document.getElementById('combo');
  if(combo>=2){c.textContent=combo+'x COMBO';c.style.opacity='1';
    c.style.color=combo>=5?'#e8b44c':combo>=3?'#f97316':'#a78bfa'}
  clearTimeout(comboT);comboT=setTimeout(()=>{combo=0;c.style.opacity='0'},3500);
  if(streak===3)addTok(2,el);if(streak===5)addTok(3,el);if(streak===8)addTok(5,el)}
function updH(){document.getElementById('g-tok').textContent=tokens;
  document.getElementById('g-xp').textContent=xp;
  document.getElementById('g-str').textContent=streak}
function flash(){let f=document.getElementById('freeze');
  f.classList.remove('flash');void f.offsetWidth;f.classList.add('flash')}

// LAYOUT
let items=[];
const CX=2000,CY=100,DY=300,XSP=460;

function layout(n,d,xc,px,py,vis){
  let nx=px!==null?xc:CX,ny=py!==null?py+DY:CY;
  let isOpen=opened.has(n.id);
  items.push({n,x:nx,y:ny,d,isOpen,vis});
  if(n.ch&&n.ch.length&&(isOpen||!vis)){
    let c=n.ch.length,sp=XSP*Math.min(c,5);
    let sx=nx-sp/2,st=c>1?sp/(c-1):0;
    for(let i=0;i<c;i++){
      let cx2=c===1?nx:sx+st*i;
      layout(n.ch[i],d+1,cx2,nx,ny,vis&&isOpen);
    }
  }
}

// WAVY PATH ? controlled by slider
function wavyPath(x1,y1,x2,y2,w){
  // w=0: straight line, w=1: full S-curve
  let dy=y2-y1,dx=x2-x1;
  let straightMy=(y1+y2)/2;
  // Control points blend from straight to curvy
  let cp1y=y1+dy*0.1*(1-w)+straightMy*w;
  let cp2y=y2-dy*0.1*(1-w)+straightMy*w;
  // Add horizontal wave at high waviness
  let waveX=dx*0.3*w;
  let cp1x=x1+waveX*(Math.random()*0.3+0.85);
  let cp2x=x2-waveX*(Math.random()*0.3+0.85);
  return 'M'+x1+','+y1+' C'+cp1x+','+cp1y+' '+cp2x+','+cp2y+' '+x2+','+y2;
}

// RENDER
const plane=document.getElementById('plane');
const lksvg=document.getElementById('lksvg');

function render(isClick){
  items=[];
  layout(T,0,CX,null,null,true);
  if(isClick)flash();

  let lk={};items.forEach(i=>lk[i.n.id]=i);
  let maxX=0,maxY=0;
  items.forEach(i=>{if(i.vis){if(i.x+200>maxX)maxX=i.x+200;if(i.y+200>maxY)maxY=i.y+200}});
  lksvg.setAttribute('width',maxX);lksvg.setAttribute('height',maxY);
  lksvg.setAttribute('viewBox','0 0 '+maxX+' '+maxY);

  // LINKS with waviness
  let svg='';
  for(let it of items){
    if(!it.vis||it.n.id==='eq0')continue;
    let pid=findPid(T,it.n.id,null);
    if(pid&&lk[pid]&&lk[pid].vis){
      let p=lk[pid];
      let col=!it.isOpen?'rgba(100,120,160,0.06)':
              it.n.type==='dead'?'rgba(220,80,80,0.18)':
              it.n.type==='result'?'rgba(80,220,140,0.2)':'rgba(100,130,200,0.16)';
      svg+='<path d="'+wavyPath(p.x,p.y+48,it.x,it.y-48,waviness)+'" stroke="'+col+'"/>';
    }
  }
  lksvg.innerHTML=svg;

  let usedIds=new Set();

  for(let it of items){
    if(!it.vis)continue;
    // Before reveal, only show root
    if(!revealed&&it.n.id!=='eq0')continue;

    let n=it.n,isOpen=it.isOpen;
    let nl=(it.x-150),nt=(it.y-42);
    usedIds.add(n.id);

    let box=els[n.id];
    if(box){
      box.style.left=nl+'px';box.style.top=nt+'px';
      // Update lock->open transition
      if(isOpen&&box.classList.contains('locked')){
        box.classList.remove('locked');
        let tc=n.type==='root'?'gold':n.type==='tool'?'purp':n.type==='result'?'grn':'red';
        box.innerHTML='<div class="tag '+tc+'">'+n.tag+'</div><div class="ltx"></div>'+
          (n.sub?'<div class="sub">'+n.sub+'</div>':'');
        try{katex.render(n.latex,box.querySelector('.ltx'),{throwOnError:false,displayMode:true})}catch(e){}
      }
    } else {
      box=document.createElement('div');
      let tc=n.type==='root'?'gold':n.type==='tool'?'purp':n.type==='result'?'grn':'red';
      if(isOpen){
        box.className='eq t-'+n.type+' fresh';
        box.innerHTML='<div class="tag '+tc+'">'+n.tag+'</div><div class="ltx"></div>'+
          (n.sub?'<div class="sub">'+n.sub+'</div>':'');
      } else {
        box.className='eq t-'+n.type+' fresh locked';
        box.innerHTML='<div class="tag '+tc+'">'+n.tag+'</div><div class="lock-icon">\u{1F512}</div>'+
          (n.cost>0?'<div class="tok-badge">\u2666'+n.cost+'</div>':'');
      }
      box.style.left=nl+'px';box.style.top=nt+'px';
      box.style.maxWidth='300px';box.dataset.id=n.id;
      plane.appendChild(box);
      els[n.id]=box;
      // KaTeX for opened
      if(isOpen){try{katex.render(n.latex,box.querySelector('.ltx'),{throwOnError:false,displayMode:true})}catch(e){}}
      requestAnimationFrame(()=>requestAnimationFrame(()=>{box.classList.remove('fresh');box.classList.add('show')}));
    }

    // CLICK HANDLER
    box.onclick=null;
    if(n.id==='eq0'&&!revealed){
      // FIRST CLICK ? reveal the tree
      box.onclick=e=>{e.stopPropagation();revealed=true;render(true)};
    } else if(!isOpen){
      // LOCKED ? click to unlock (spend tokens)
      box.onclick=e=>{e.stopPropagation();
        if(n.cost>0&&tokens<n.cost){
          box.style.borderColor='#f87171';box.style.boxShadow='0 0 16px rgba(248,80,80,0.2)';
          setTimeout(()=>{box.style.borderColor='';box.style.boxShadow=''},500);return}
        tokens-=n.cost;opened.add(n.id);addXP(n.xp,box);bumpStr(box);
        if(n.type==='result'||n.type==='dead')addTok(1,box);updH();
        render(true)};
    } else if(n.ch&&n.ch.length&&!n.ch.some(c=>!opened.has(c.id))){
      // ALL CHILDREN OPEN ? click to collapse
      box.onclick=e=>{e.stopPropagation();
        if(n.id!=='eq0'){opened.delete(n.id);collAll(n);render(true)}};
    }
  }

  // Remove stale
  Object.keys(els).forEach(id=>{
    if(!usedIds.has(id)){els[id].remove();delete els[id]}});

  let vis=items.filter(i=>i.vis&&(revealed||i.n.id==='eq0'));
  document.getElementById('h-n').textContent=vis.length;
  document.getElementById('h-d').textContent=Math.max(0,...vis.map(i=>i.d));
}

function collAll(n){if(n.ch)n.ch.forEach(c=>{opened.delete(c.id);if(els[c.id]){els[c.id].remove();delete els[c.id]}collAll(c)})}
function findPid(t,tid,pid){if(t.id===tid)return pid;
  if(t.ch)for(let c of t.ch){let f=findPid(c,tid,t.id);if(f!==null)return f}return null}

// PAN ZOOM
let panX=0,panY=0,zm=0.55;
function center(){panX=(window.innerWidth/2/zm)-CX;panY=80/zm;upT()}
function upT(){plane.style.zoom=zm;plane.style.left=panX+'px';plane.style.top=panY+'px'}
let drag=false,lm={x:0,y:0};
document.addEventListener('pointerdown',e=>{if(e.target.closest('.eq'))return;
  drag=true;lm={x:e.clientX,y:e.clientY}});
document.addEventListener('pointermove',e=>{if(!drag)return;
  panX+=(e.clientX-lm.x)/zm;panY+=(e.clientY-lm.y)/zm;lm={x:e.clientX,y:e.clientY};upT()});
document.addEventListener('pointerup',()=>{drag=false});
document.addEventListener('wheel',e=>{e.preventDefault();let oz=zm;
  zm*=e.deltaY>0?0.92:1.08;zm=Math.max(0.18,Math.min(2.0,zm));
  panX=e.clientX/zm-(e.clientX/oz-panX);panY=e.clientY/zm-(e.clientY/oz-panY);upT()},{passive:false});

center();render(false);
</script>
</body>
</html>
