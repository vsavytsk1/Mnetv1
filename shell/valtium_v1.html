<script>

(function() {
'use strict';

var canvas = document.getElementById('canvas');
var ctx    = canvas.getContext('2d');
var W = 0, H = 0;

function initSize() {
  W = canvas.width  = canvas.parentElement
    ? (canvas.parentElement.clientWidth  || window.innerWidth)
    : window.innerWidth;
  H = canvas.height = canvas.parentElement
    ? (canvas.parentElement.clientHeight || window.innerHeight)
    : window.innerHeight;
  if (W < 10) W = window.innerWidth  || 800;
  if (H < 10) H = window.innerHeight || 600;
}

var nodes = [];
var edges = [];
var adjMap = {};
var omega_arr = null;
var alpha  = 1.0;
var ALPHA_MIN   = 0.001;
var ALPHA_DECAY = 1 - Math.pow(ALPHA_MIN, 1/300);
var ns_step = 0;
var scale = 1.0, offX = 0, offY = 0;
var isDrag = false, lastMX = 0, lastMY = 0;
var NU = 0.01;
var chiShown = false;

function log(msg) {
  var el = document.getElementById('log');
  if (el) el.textContent = msg;
}

// Load pre-computed vault data
function loadData() {
  var raw = VALTIUM_DATA;
  nodes = raw.nodes.map(function(n) {
    return { id:n.id, label:n.label, type:n.type,
             deg:n.deg, isPent:n.isPent,
             x:0, y:0, vx:0, vy:0 };
  });
  edges = raw.edges;

  // Build adjMap
  adjMap = {};
  nodes.forEach(function(n) { adjMap[n.id] = []; });
  edges.forEach(function(e) {
    var a = nodes[e.s], b = nodes[e.t];
    if (a && b) {
      adjMap[a.id].push(b.id);
      adjMap[b.id].push(a.id);
    }
  });

  // Count type distribution
  var pents = nodes.filter(function(n){ return n.isPent; });
  var orphans = nodes.filter(function(n){ return n.deg === 0; });
  document.getElementById('s-pents').textContent   = pents.length;
  document.getElementById('s-orphans').textContent = orphans.length;
  document.getElementById('h-p').textContent = pents.length + ' (type:pentagon)';

  // Chi approx: V - E + F where F = E - V + C
  var C = countComponents();
  var F = edges.length - nodes.length + C;
  var chi = nodes.length - edges.length + F;
  document.getElementById('h-f').textContent   = F;
  document.getElementById('h-chi').textContent = chi;
  document.getElementById('h-chi').className   = chi === 2 ? 'gold' : 'val';

  log('VALTIUM -- V=' + nodes.length + ' E=' + edges.length +
      ' C=' + C + ' F=' + F + ' chi=' + chi +
      ' P=' + pents.length + ' -- laying out...');

  // Show chi banner after 3s if chi=2
  if (chi === 2) {
    setTimeout(function() {
      document.getElementById('chi-val').textContent = chi;
      document.getElementById('p-val').textContent   = pents.length;
      document.getElementById('chi-banner').classList.add('show');
      setTimeout(function() {
        document.getElementById('chi-banner').classList.remove('show');
      }, 4000);
    }, 3000);
  }

  // Init positions
  nodes.forEach(function(n) {
    n.x  = W/2 + (Math.random()-0.5) * Math.min(W,H)*0.4;
    n.y  = H/2 + (Math.random()-0.5) * Math.min(W,H)*0.4;
    n.vx = 0; n.vy = 0;
  });

  // Init NS
  omega_arr = new Float64Array(nodes.length);
  pents.forEach(function(n) {
    var idx = nodes.indexOf(n);
    if (idx >= 0) omega_arr[idx] = (Math.random()-0.5)*0.5;
  });

  alpha = 1.0;
  requestAnimationFrame(tick);
}

function countComponents() {
  if (!nodes.length) return 0;
  var visited = {};
  var count = 0;
  nodes.forEach(function(n) {
    if (!visited[n.id]) {
      count++;
      var q = [n.id];
      while (q.length) {
        var cur = q.pop();
        if (visited[cur]) continue;
        visited[cur] = true;
        (adjMap[cur] || []).forEach(function(nb) {
          if (!visited[nb]) q.push(nb);
        });
      }
    }
  });
  return count;
}

// Force layout
var CHARGE = -100, LINK_D = 35, LINK_STR = 0.4, GRAVITY = 0.07;

function applyForces() {
  var n = nodes.length;
  for (var i = 0; i < n; i++) {
    for (var j = i+1; j < n; j++) {
      var dx = nodes[j].x - nodes[i].x;
      var dy = nodes[j].y - nodes[i].y;
      var d2 = dx*dx + dy*dy + 1;
      var d  = Math.sqrt(d2);
      var f  = alpha * CHARGE / d2;
      var fx = f*dx/d, fy = f*dy/d;
      nodes[i].vx -= fx; nodes[i].vy -= fy;
      nodes[j].vx += fx; nodes[j].vy += fy;
    }
  }
  edges.forEach(function(e) {
    var a = nodes[e.s], b = nodes[e.t];
    if (!a || !b) return;
    var dx = b.x-a.x, dy = b.y-a.y;
    var d = Math.sqrt(dx*dx+dy*dy)||1;
    var f = alpha * LINK_STR * (d-LINK_D) / d;
    var fx = f*dx, fy = f*dy;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });
  nodes.forEach(function(nd) {
    nd.vx += alpha * GRAVITY * (W/2 - nd.x);
    nd.vy += alpha * GRAVITY * (H/2 - nd.y);
    nd.vx *= 0.6; nd.vy *= 0.6;
    nd.x += nd.vx; nd.y += nd.vy;
  });
}

// NS diffusion
function nsStep() {
  if (!omega_arr) return;
  var new_omega = new Float64Array(nodes.length);
  nodes.forEach(function(nd, i) {
    var sum = 0, deg = nd.deg||1;
    (adjMap[nd.id]||[]).forEach(function(nbId) {
      var j = nodes.findIndex(function(x){return x.id===nbId;});
      if (j>=0) sum += omega_arr[j] - omega_arr[i];
    });
    new_omega[i] = omega_arr[i] + NU * sum / deg;
  });
  if (ns_step % 10 === 0) {
    nodes.forEach(function(nd, i) {
      if (nd.isPent) new_omega[i] += (Math.random()-0.5)*0.02;
    });
  }
  omega_arr = new_omega;
  ns_step++;
}

// Color
function omegaToColor(omega, type) {
  if (type === 'pentagon') return '#ffd700';
  if (type === 'atom')     return '#00ffd5';
  if (type === 'hub')      return '#c084fc';
  var v = Math.tanh(omega * 5);
  if (v > 0) {
    return 'rgb(' + Math.round(v*80)   + ',' + Math.round(200+v*55) + ',' + Math.round(255-v*155) + ')';
  } else {
    v = -v;
    return 'rgb(' + Math.round(v*160) + ',' + Math.round(200-v*140) + ',255)';
  }
}

// Render
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(scale, scale);
  if (!nodes.length) { ctx.restore(); return; }

  // Edges
  ctx.lineWidth = 0.5 / scale;
  edges.forEach(function(e) {
    var a = nodes[e.s], b = nodes[e.t];
    if (!a||!b) return;
    var avg = omega_arr ? (omega_arr[e.s]+omega_arr[e.t])*0.5 : 0;
    var v = Math.tanh(avg*3);
    ctx.strokeStyle = v > 0
      ? 'rgba(20,' + Math.round(50+v*30) + ',30,0.3)'
      : 'rgba(' + Math.round(25-v*15) + ',20,45,0.3)';
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(function(nd, i) {
    var om  = omega_arr ? omega_arr[i] : 0;
    var col = omegaToColor(om, nd.type);
    var r   = nd.isPent   ? 7 + Math.log1p(nd.deg)*1.8
            : nd.type==='atom' ? 4 + Math.log1p(nd.deg)*0.9
            : 2 + Math.log1p(nd.deg)*0.7;
    var glowR = nd.isPent ? Math.max(20, Math.abs(om)*35)
              : Math.abs(om)*25;
    if (glowR > 3) {
      var g = ctx.createRadialGradient(nd.x, nd.y, r*0.3, nd.x, nd.y, r+glowR);
      g.addColorStop(0, col.replace('rgb','rgba').replace(')',',0.25)'));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(nd.x, nd.y, r+glowR, 0, 2*Math.PI);
      ctx.fillStyle = g;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(nd.x, nd.y, r, 0, 2*Math.PI);
    ctx.fillStyle = col;
    ctx.fill();
  });

  ctx.restore();
}

// Tick
function tick() {
  if (alpha > ALPHA_MIN) {
    applyForces();
    alpha *= (1-ALPHA_DECAY);
    document.getElementById('h-alpha').textContent = alpha.toFixed(4);
  }
  nsStep();
  render();
  if (ns_step % 30 === 0 && omega_arr) {
    var mx = 0;
    for (var i=0; i<omega_arr.length; i++) if (Math.abs(omega_arr[i])>mx) mx=Math.abs(omega_arr[i]);
    document.getElementById('h-omega').textContent = mx.toFixed(4);
    document.getElementById('h-step').textContent  = ns_step;
  }
  requestAnimationFrame(tick);
}

// Pan/zoom
window.addEventListener('resize', function() { initSize(); });
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var f = e.deltaY > 0 ? 0.9 : 1.1;
  offX = e.clientX - f*(e.clientX-offX);
  offY = e.clientY - f*(e.clientY-offY);
  scale = Math.max(0.05, Math.min(10, scale*f));
}, {passive:false});
canvas.addEventListener('pointerdown', function(e) {
  isDrag=true; lastMX=e.clientX; lastMY=e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', function(e) {
  if (!isDrag) return;
  offX += e.clientX-lastMX; offY += e.clientY-lastMY;
  lastMX=e.clientX; lastMY=e.clientY;
});
canvas.addEventListener('pointerup', function() { isDrag=false; });
canvas.addEventListener('mousemove', function(e) {
  if (isDrag||!nodes.length) return;
  var mx=(e.clientX-offX)/scale, my=(e.clientY-offY)/scale;
  var hit=null, best=20*20;
  nodes.forEach(function(nd) {
    var d2=(nd.x-mx)*(nd.x-mx)+(nd.y-my)*(nd.y-my);
    if (d2<best){best=d2;hit=nd;}
  });
  canvas.title = hit ? hit.label+' ('+hit.type+' deg:'+hit.deg+')' : '';
});

// postMessage from ENG
window.addEventListener('message', function(e) {
  if (e.data === 'VALE_CENTER') { initSize(); }
});

window.addEventListener('load', function() {
  initSize();
  loadData();
});
if (window.innerWidth > 10) initSize();

})();

</script>
