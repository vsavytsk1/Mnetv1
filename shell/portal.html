<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;display:flex;align-items:center;
  justify-content:center;height:100vh;flex-direction:column;gap:16px;
  font-family:ui-monospace,"SF Mono",monospace}
.msg{color:#00d4ff;font-size:11px;letter-spacing:0.18em;opacity:0.5}
.url{color:#1a3a3a;font-size:9px;letter-spacing:0.1em;id:"portal-url"}
.arr{color:#00d4ff;font-size:28px;opacity:0.2}
</style></head>
<body>
<div class="msg">LAUNCHED IN NEW TAB</div>
<div class="url" id="portal-url"></div>
<div class="arr">&#8599;</div>
<script>
var p = new URLSearchParams(window.location.search);
var u = p.get('url') || '';
document.getElementById('portal-url').textContent = u;
</script>
</body></html>
