  menu.classList.toggle('open');
}

function apSetStatus(msg) {
  document.getElementById('ap-status').textContent = msg;
}

function apRun(seqName) {
  if (_apRunning) apStop();
  var seq = _apSequences[seqName];
  if (!seq) return;

  _apRunning = true;
  document.getElementById('ap-toggle').classList.add('running');
  document.getElementById('ap-stop').classList.add('visible');
  document.getElementById('ap-menu').classList.remove('open');

  var steps = seq.steps;
  var idx = 0;

  function tick() {
    if (!_apRunning || idx >= steps.length) {
      apDone();
      return;
    }
    var step = steps[idx];
    apSetStatus(seq.name + ' [' + (idx+1) + '/' + steps.length + '] ' + step.cmd);
    cmd(step.cmd);
    idx++;
    if (idx < steps.length) {
      _apTimer = setTimeout(tick, step.wait || 500);
    } else {
      apDone();
    }
  }

  log('=== AUTOPILOT: ' + seq.name + ' (' + steps.length + ' steps) ===');
  tick();
}

function apStop() {
  _apRunning = false;
  if (_apTimer) { clearTimeout(_apTimer); _apTimer = null; }
  document.getElementById('ap-toggle').classList.remove('running');
  document.getElementById('ap-stop').classList.remove('visible');
  apSetStatus('stopped');
  log('AUTOPILOT: stopped');
}

function apDone() {
  _apRunning = false;
  _apTimer = null;
  document.getElementById('ap-toggle').classList.remove('running');
  document.getElementById('ap-stop').classList.remove('visible');
  apSetStatus('done');
  log('AUTOPILOT: complete');
}

// ═══════════════════════════════════════════════════════
// §13  FLOATING CMD INPUT
// ═══════════════════════════════════════════════════════
var cmdInput = document.getElementById('cmd-input');
cmdInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    cmdBarRun();
  }
  // Prevent R from triggering hard reset while typing
  e.stopPropagation();
});

function cmdBarRun() {
  var val = cmdInput.value.trim();
  if (!val) return;
  // Support comma-separated batch: "HEX, FRACTALIZE, FRACTALIZE"
  var parts = val.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  if (parts.length > 1) {
    batch(parts);
  } else {
    cmd(val);
  }
  cmdInput.value = '';
  cmdInput.focus();
}

// ═══════════════════════════════════════════════════════
// §15  EXPORT / IMPORT — round-trip validation
//     export: serialize state → .mnet text
//     import: parse .mnet text → rebuild state
//     strict: 1 bad byte = reject + banner
// ═══════════════════════════════════════════════════════
var _ioMode = 'export'; // 'export' or 'import'

function bannerShow(title, body, isOk) {
  var b = document.getElementById('banner');
  document.getElementById('b-title').textContent = title;
  document.getElementById('b-body').textContent = body;
  b.className = isOk ? 'open ok' : 'open';
}
function bannerClose() {
  document.getElementById('banner').className = '';
}

function ioClose() {
  document.getElementById('io-overlay').className = '';
}

function ioAction() {
  if (_ioMode === 'export') {
    // Copy to clipboard
    var ta = document.getElementById('io-text');
    ta.select();
    document.execCommand('copy');
    bannerShow('Copied!', 'State exported to clipboard as .mnet text.', true);
    log('EXPORT: copied to clipboard');
  } else {
    // Import
    ioImportRun();
  }
}

// ─── EXPORT: serialize current state to .mnet ───
function ioExport() {
  _ioMode = 'export';
  var lines = [];
  lines.push('# MachineNet Graph Sandbox — .mnet export');
  lines.push('# v4.9 | ' + new Date().toISOString());
  lines.push('');

  // Lattice
  lines.push('# ── Lattice boundary');
  lines.push('set lattice.boundary ' + latticeBoundary);
  lines.push('set lattice.radius ' + latticeRadius);
  lines.push('');

  // Camera
  lines.push('# ── Camera');
  lines.push('set camera.position ' + camera.position.x.toFixed(2) + ' ' + camera.position.y.toFixed(2) + ' ' + camera.position.z.toFixed(2));
  lines.push('');

  // Graphs
  ['A','B','R'].forEach(function(key) {
    var g = graphs[key];
    if (!g.nodes.length && !g.edges.length) return;

    lines.push('# ── Graph ' + key);
    lines.push('graph ' + key);
    lines.push('');

    // Nodes
    var nodeCount = 0;
    g.nodes.forEach(function(n) {
      // Validate: position must be finite numbers
      if (!isFinite(n.pos[0]) || !isFinite(n.pos[1]) || !isFinite(n.pos[2])) {
        bannerShow('Hey! You can\'t do that.', 'Node ' + n.id + ' has invalid position [' + n.pos.join(', ') + ']. Cannot export non-finite coordinates.', false);
        return;
      }
      lines.push('node ' + n.id + ' ' + n.pos[0].toFixed(3) + ' ' + n.pos[1].toFixed(3) + ' ' + n.pos[2].toFixed(3));
      nodeCount++;
    });
    if (nodeCount) lines.push('');

    // Edges
    g.edges.forEach(function(e) {
      lines.push('edge ' + e[0] + ' ' + e[1]);
    });
    if (g.edges.length) lines.push('');
    lines.push('endgraph');
    lines.push('');
  });

  // Active state
  lines.push('# ── Active state');
  lines.push(activeGraph);
  lines.push(activeTool.toUpperCase());
  lines.push('');
  lines.push('# Total: A(' + graphs.A.nodes.length + 'n,' + graphs.A.edges.length + 'e)');
  lines.push('#        B(' + graphs.B.nodes.length + 'n,' + graphs.B.edges.length + 'e)');
  lines.push('#        R(' + graphs.R.nodes.length + 'n,' + graphs.R.edges.length + 'e)');

  var text = lines.join('\n');
  document.getElementById('io-title').textContent = 'EXPORT — .mnet';
  document.getElementById('io-text').value = text;
  document.getElementById('io-text').readOnly = true;
  document.getElementById('io-action').textContent = 'COPY';
  document.getElementById('io-overlay').className = 'open';
  log('EXPORT: ' + lines.length + ' lines generated');
}

// ─── IMPORT: open overlay for paste ───
function ioImportOpen() {
  _ioMode = 'import';
  document.getElementById('io-title').textContent = 'IMPORT — paste .mnet text';
  document.getElementById('io-text').value = '';
  document.getElementById('io-text').readOnly = false;
  document.getElementById('io-action').textContent = 'IMPORT';
  document.getElementById('io-overlay').className = 'open';
  document.getElementById('io-text').focus();
}

// ─── IMPORT: parse + validate + rebuild ───
function ioImportRun() {
  var raw = document.getElementById('io-text').value;
  if (!raw.trim()) {
    bannerShow('Hey! You can\'t do that.', 'Nothing to import. Paste .mnet text first.', false);
    return;
  }

  var lines = raw.split('\n');
  var errors = [];
  var lineNum = 0;

  // Temp state
  var newGraphs = {
    A: { nodes:[], edges:[], color:0x00d4ff, name:'A' },
    B: { nodes:[], edges:[], color:0xffd700, name:'B' },
    R: { nodes:[], edges:[], color:0xff69b4, name:'Result' }
  };
  var newBoundary = 'CUBE';
  var newRadius = 10;
  var newCamera = null;
  var newActiveGraph = 'A';
  var newActiveTool = 'NODE';
  var currentGraphKey = null;
  var maxNodeId = 0;
  var nodeIdSet = {};  // track all declared node ids

  // Pass 1: Validate every line
  for (var i = 0; i < lines.length; i++) {
    lineNum = i + 1;
    var line = lines[i].trim();

    // Skip empty and comments
    if (!line || line.charAt(0) === '#') continue;

    var parts = line.split(/\s+/);
    var cmd0 = parts[0].toLowerCase();

    if (cmd0 === 'set') {
      if (parts.length < 3) { errors.push('L' + lineNum + ': set needs <variable> <value>'); continue; }
      var varName = parts[1].toLowerCase();
      if (varName === 'lattice.boundary') {
        var val = parts[2].toUpperCase();
        if (val !== 'CUBE' && val !== 'PENT' && val !== 'HEX') {
          errors.push('L' + lineNum + ': boundary must be CUBE, PENT, or HEX (got: ' + parts[2] + ')');
        } else { newBoundary = val; }
      } else if (varName === 'lattice.radius') {
        var r = parseFloat(parts[2]);
        if (!isFinite(r) || r < 1 || r > 50) {
          errors.push('L' + lineNum + ': radius must be 1–50 (got: ' + parts[2] + ')');
        } else { newRadius = r; }
      } else if (varName === 'camera.position') {
        if (parts.length < 5) { errors.push('L' + lineNum + ': camera.position needs x y z'); continue; }
        var cx = parseFloat(parts[2]), cy = parseFloat(parts[3]), cz = parseFloat(parts[4]);
        if (!isFinite(cx) || !isFinite(cy) || !isFinite(cz)) {
          errors.push('L' + lineNum + ': camera position has non-finite values');
        } else { newCamera = [cx, cy, cz]; }
      }
      // Unknown set vars are silently skipped (forward compat)

    } else if (cmd0 === 'graph') {
      if (parts.length < 2) { errors.push('L' + lineNum + ': graph needs A, B, or R'); continue; }
      var gk = parts[1].toUpperCase();
      if (gk !== 'A' && gk !== 'B' && gk !== 'R') {
        errors.push('L' + lineNum + ': graph must be A, B, or R (got: ' + parts[1] + ')');
      } else { currentGraphKey = gk; }

    } else if (cmd0 === 'endgraph') {
      currentGraphKey = null;

    } else if (cmd0 === 'node') {
      if (!currentGraphKey) { errors.push('L' + lineNum + ': node outside graph block'); continue; }
      if (parts.length < 5) { errors.push('L' + lineNum + ': node needs <id> <x> <y> <z>'); continue; }
      var nid = parseInt(parts[1]);
      var nx = parseFloat(parts[2]), ny = parseFloat(parts[3]), nz = parseFloat(parts[4]);
      if (!isFinite(nid) || nid < 0) { errors.push('L' + lineNum + ': node id must be >= 0 integer'); continue; }
      if (!isFinite(nx) || !isFinite(ny) || !isFinite(nz)) { errors.push('L' + lineNum + ': node position non-finite'); continue; }
      newGraphs[currentGraphKey].nodes.push({ id:nid, pos:[nx,ny,nz], label:currentGraphKey+nid });
      nodeIdSet[currentGraphKey + ':' + nid] = true;
      if (nid > maxNodeId) maxNodeId = nid;

    } else if (cmd0 === 'edge') {
      if (!currentGraphKey) { errors.push('L' + lineNum + ': edge outside graph block'); continue; }
      if (parts.length < 3) { errors.push('L' + lineNum + ': edge needs <id1> <id2>'); continue; }
      var e0 = parseInt(parts[1]), e1 = parseInt(parts[2]);
      if (!isFinite(e0) || !isFinite(e1)) { errors.push('L' + lineNum + ': edge ids must be integers'); continue; }
      newGraphs[currentGraphKey].edges.push([e0, e1]);

    } else if (cmd0 === 'a' || cmd0 === 'b') {
      newActiveGraph = cmd0.toUpperCase();

    } else if (['node','edge','move','grab','delete'].indexOf(cmd0) >= 0) {
      newActiveTool = cmd0.toUpperCase();

    } else {
      // Unknown line — strict reject
      errors.push('L' + lineNum + ': unknown command \"' + line + '\"');
    }
  }

  // Pass 2: Validate edge references
  ['A','B','R'].forEach(function(key) {
    newGraphs[key].edges.forEach(function(e, ei) {
      if (!nodeIdSet[key + ':' + e[0]]) errors.push('Graph ' + key + ' edge ' + ei + ': node ' + e[0] + ' not declared');
      if (!nodeIdSet[key + ':' + e[1]]) errors.push('Graph ' + key + ' edge ' + ei + ': node ' + e[1] + ' not declared');
    });
  });

  // REJECT if any errors
  if (errors.length) {
    var msg = errors.length + ' error' + (errors.length > 1 ? 's' : '') + ' found:\n\n' + errors.slice(0, 8).join('\n');
    if (errors.length > 8) msg += '\n... and ' + (errors.length - 8) + ' more';
    bannerShow('Sorry, this doesn\'t work here.', msg, false);
    log('IMPORT REJECTED: ' + errors.length + ' errors');
    errors.forEach(function(e) { log('  ' + e); });
    return;
  }

  // APPLY — everything validated, commit
  graphs.A = newGraphs.A;
  graphs.B = newGraphs.B;
  graphs.R = newGraphs.R;
  nodeIdCounter = maxNodeId + 1;
  latticeBoundary = newBoundary;
  latticeRadius = newRadius;
  rebuildLattice();
  setLatticeBoundary(newBoundary);
  if (newCamera) camera.position.set(newCamera[0], newCamera[1], newCamera[2]);
  setGraph(newActiveGraph);
  setTool(newActiveTool.toLowerCase());
  rebuildScene();

  ioClose();
  var totalN = graphs.A.nodes.length + graphs.B.nodes.length + graphs.R.nodes.length;
  var totalE = graphs.A.edges.length + graphs.B.edges.length + graphs.R.edges.length;
  bannerShow('Import successful!', totalN + ' nodes, ' + totalE + ' edges loaded. Lattice: ' + newBoundary + ' R=' + newRadius, true);
  log('IMPORT: ' + totalN + ' nodes, ' + totalE + ' edges, boundary=' + newBoundary);
}

animate();
</script>
</body>
