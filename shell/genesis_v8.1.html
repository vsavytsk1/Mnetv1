    }

    // Determine which face array to iterate
    var facesArray = (gkState && gkState.faces) ? gkState.faces : (S ? S.faces : []);

    facesArray.forEach(function(face, i) {
        // mnet_v6 style: face is an array of node IDs
        // GK style: face is an object with face.pts
        var entry = { res: 0, energy: 0, vx: 0, vz: 0, p: 0, count: 0 };

        if (Array.isArray(face)) {
            // mnet_v6 node-ID face array
            face.forEach(function(nid) {
                var n = lk[nid];
                if (!n) return;
                var dvMag = Math.sqrt((n._dvx||0)*(n._dvx||0) + (n._dvz||0)*(n._dvz||0));
                entry.res    += dvMag;
                entry.energy += (n.energy || 0);
                entry.vx     += (n._vx || 0);
                entry.vz     += (n._vz || 0);
                entry.p      += (n._p  || 0);
                entry.count  += 1;
            });
        } else if (face && face.pts) {
            // GK face object ? no live node data attached, energy defaults to 0
            // Caller must inject per-face energy separately if available
            entry.count = face.pts.length;
        }

        if (entry.count > 0) {
            entry.res    /= entry.count;
            entry.energy /= entry.count;
            entry.vx     /= entry.count;
            entry.vz     /= entry.count;
            entry.p      /= entry.count;
        }

        flowData.push(entry);
    });

    return flowData;
};

// ---------------------------------------------------------------------------
// ?C  CLUSTER ENERGY
//
//  Three aggregation strategies:
//    'max'  ? worst-case face in cluster (conservative; Nanite-like)
//    'avg'  ? mean energy    (smooth; good for convergence panels)
//    'sum'  ? total energy   (proportional to cluster size; for LOD budget)
//
//  cluster.energy is cached.  Set cluster.dirty = true to force recompute.
// ---------------------------------------------------------------------------

MNetNanite.clusterEnergy = function(cluster, metric) {
    if (!cluster.dirty && cluster.energy !== null && cluster.energy !== undefined) {
        return cluster.energy;
    }
    metric = metric || cluster.energyMetric || MNetNanite.ENERGY_METRIC;
    var fd = cluster._flowData;
    if (!fd || !fd.length) {
        cluster.energy = 0;
        cluster.dirty  = false;
        return 0;
    }
    var val;
    if (metric === 'max') {
        val = 0;
        fd.forEach(function(d) { if (d.energy > val) val = d.energy; });
    } else if (metric === 'sum') {
        val = 0;
        fd.forEach(function(d) { val += d.energy; });
    } else {
        // avg (default)
        val = 0;
        fd.forEach(function(d) { val += d.energy; });
        val /= fd.length;
    }
    cluster.energy = val;
    cluster.dirty  = false;
    return val;
};

// ---------------------------------------------------------------------------
// ?D  BOUNDING SPHERE ? for camera culling in future VR renderer
// ---------------------------------------------------------------------------

function computeBounds(faces) {
    var cx = 0, cy = 0, cz = 0, count = 0;
    faces.forEach(function(face) {
        var pts = face.pts || [];
        pts.forEach(function(p) { cx += p[0]; cy += p[1]; cz += p[2]; count++; });
    });
    if (count === 0) return { cx: 0, cy: 0, cz: 0, r: 0 };
    cx /= count; cy /= count; cz /= count;
    var r = 0;
    faces.forEach(function(face) {
        var pts = face.pts || [];
        pts.forEach(function(p) {
            var dx = p[0]-cx, dy = p[1]-cy, dz = p[2]-cz;
            var d = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if (d > r) r = d;
        });
    });
    return { cx: cx, cy: cy, cz: cz, r: r };
}

// ---------------------------------------------------------------------------
// ?E  CLUSTER FACTORY
// ---------------------------------------------------------------------------

var _cid = 0;
function makeCluster(faces, faceIndices, level, anchor, flowDataSlice) {
    _cid++;
    return {
        id:           'C_' + level + '_' + _cid,
        faces:        faces,
        faceIndices:  faceIndices,
        level:        level,
        anchor:       anchor || null,
        energy:       null,
        energyMetric: MNetNanite.ENERGY_METRIC,
        children:     [],
        parent:       null,
        bounds:       computeBounds(faces),
        dirty:        true,
        _flowData:    flowDataSlice || []
    };
}

// ---------------------------------------------------------------------------
// ?F  SPATIAL GROUPING ? greedy neighbor-based clustering
//
//  Groups faces at the same refinement level into clusters of ~CLUSTER_SIZE.
//  Strategy: greedy scan with adjacency preference (like METIS but simpler).
//
//  Two faces are "adjacent" if they share a vertex (by coordinate proximity)
//  or share an anchor.  We prefer to keep same-anchor faces together because
//  that maps cleanly to the 12-pentagon DAG roots.
// ---------------------------------------------------------------------------

function faceCentroid(face) {
    var pts = face.pts || [];
    var cx = 0, cy = 0, cz = 0;
    pts.forEach(function(p) { cx += p[0]; cy += p[1]; cz += p[2]; });
    var n = pts.length || 1;
    return [cx/n, cy/n, cz/n];
}

function clusterFacesAtLevel(facesAtLevel, indicesAtLevel, flowData, clusterSize) {
    clusterSize = clusterSize || MNetNanite.CLUSTER_SIZE;
    var used    = new Array(facesAtLevel.length).fill(false);
    var clusters = [];
    var level   = facesAtLevel.length > 0 ? facesAtLevel[0].level : 0;

    // Precompute centroids
    var centroids = facesAtLevel.map(faceCentroid);

    // Group by anchor first, then by spatial proximity
    var anchorGroups = {};
    facesAtLevel.forEach(function(face, i) {
        var ak = face.anchor || '_none_';
        if (!anchorGroups[ak]) anchorGroups[ak] = [];
        anchorGroups[ak].push(i);
    });

    function buildClusterFromIndices(localIdxs) {
        var faces  = localIdxs.map(function(i) { return facesAtLevel[i]; });
        var gIdxs  = localIdxs.map(function(i) { return indicesAtLevel[i]; });
        var fdSub  = gIdxs.map(function(gi)    { return flowData[gi] || { res:0, energy:0, vx:0, vz:0, p:0 }; });
        var anchor = faces[0].anchor || null;
        var c = makeCluster(faces, gIdxs, level, anchor, fdSub);
        clusters.push(c);
        return c;
    }

    // Process each anchor group
    Object.keys(anchorGroups).sort().forEach(function(ak) {
        var group  = anchorGroups[ak];
        var batch  = [];
        group.forEach(function(li) {
            if (used[li]) return;
            batch.push(li);
            used[li] = true;
            if (batch.length >= clusterSize) {
                buildClusterFromIndices(batch);
                batch = [];
            }
        });
        if (batch.length > 0) buildClusterFromIndices(batch);
    });

    return clusters;
}

// ---------------------------------------------------------------------------
// ?G  BUILD CLUSTER HIERARCHY
//
//  Main entry point.  Takes a GK state and flowData, returns a DAG.
//
//  Algorithm:
//    1.  Bucket faces by refinement level.
//    2.  For each level L (leaf ? root), build clusters of ~CLUSTER_SIZE faces.
//    3.  For each cluster at level L, find which cluster at level L-1 covers
//        the same territory (by anchor ID).  Connect parent ? children.
//    4.  Identify roots: clusters at level 0 (the original C60 faces).
//        Group further by pentagonal anchor to get the 12 DAG root groups.
//
//  opts = {
//    clusterSize:  int,      // override CLUSTER_SIZE for this build
//    energyMetric: string,   // override ENERGY_METRIC
//  }
// ---------------------------------------------------------------------------

MNetNanite.buildClusterHierarchy = function(gkState, flowData, opts) {
    opts      = opts || {};
    _cid      = 0;   // reset cluster id counter for reproducible ids
    var cSize = opts.clusterSize  || MNetNanite.CLUSTER_SIZE;
    var faces = gkState.faces;
    flowData  = flowData || new Array(faces.length).fill({ res:0, energy:0, vx:0, vz:0, p:0 });

    // Step 1: bucket faces by level
    var byLevel = {};
    var idxByLevel = {};
    var maxLevel = 0;
    faces.forEach(function(face, i) {
        var lv = face.level || 0;
        if (lv > maxLevel) maxLevel = lv;
        if (!byLevel[lv])    { byLevel[lv]    = []; idxByLevel[lv]    = []; }
        byLevel[lv].push(face);
        idxByLevel[lv].push(i);
    });

    // Step 2: build clusters at each level
    var levelClusters = {};
    for (var lv = 0; lv <= maxLevel; lv++) {
        var lvFaces = byLevel[lv]   || [];
        var lvIdxs  = idxByLevel[lv] || [];
        if (!lvFaces.length) { levelClusters[lv] = []; continue; }
        levelClusters[lv] = clusterFacesAtLevel(lvFaces, lvIdxs, flowData, cSize);
    }

    // Step 3: wire parent ? children across levels
    //  A cluster at level L+1 is a child of the level-L cluster
    //  whose anchor matches (or whose face bounds are closest).
    for (var lv = 1; lv <= maxLevel; lv++) {
        var parentLevel = levelClusters[lv - 1] || [];
        var childLevel  = levelClusters[lv]      || [];

        // Build anchor ? parent cluster index map
        var anchorToParent = {};
        parentLevel.forEach(function(pc, pi) {
            if (pc.anchor) anchorToParent[pc.anchor] = pi;
        });

        // Build a fallback centroid ? nearest parent map
        var parentCentroids = parentLevel.map(function(pc) {
            return { cx: pc.bounds.cx, cy: pc.bounds.cy, cz: pc.bounds.cz, idx: 0 };
        });
        parentCentroids.forEach(function(pc, i) { pc.idx = i; });

        childLevel.forEach(function(cc) {
            var pi = -1;
            if (cc.anchor && anchorToParent[cc.anchor] !== undefined) {
                pi = anchorToParent[cc.anchor];
            } else {
                // Nearest centroid fallback
                var best = Infinity;
                parentCentroids.forEach(function(pc) {
                    var dx = cc.bounds.cx - pc.cx;
                    var dy = cc.bounds.cy - pc.cy;
                    var dz = cc.bounds.cz - pc.cz;
                    var d  = dx*dx + dy*dy + dz*dz;
                    if (d < best) { best = d; pi = pc.idx; }
                });
            }
            if (pi >= 0) {
                cc.parent = parentLevel[pi];
                parentLevel[pi].children.push(cc);
            }
        });
    }

    // Step 4: identify roots and anchor map
    var roots     = levelClusters[0] || [];
    var anchorMap = {};
    roots.forEach(function(r) { if (r.anchor) anchorMap[r.anchor] = r; });

    // Flat list for convenience
    var allNodes = [];
    for (var lv = 0; lv <= maxLevel; lv++) {
        (levelClusters[lv] || []).forEach(function(c) { allNodes.push(c); });
    }

    // Compute initial energies
    allNodes.forEach(function(c) { MNetNanite.clusterEnergy(c); });

    return {
        roots:     roots,
        allNodes:  allNodes,
        levels:    levelClusters,
        maxLevel:  maxLevel,
        anchorMap: anchorMap
    };
};

// ---------------------------------------------------------------------------
// ?H  UPDATE ENERGIES
//
//  Call this every N simulation steps (not every frame) to refresh the DAG
//  with new flow data without rebuilding the hierarchy.
//
//  flowData must be the same length as gkState.faces was when the DAG was built.
// ---------------------------------------------------------------------------

MNetNanite.updateEnergies = function(dag, flowData) {
    dag.allNodes.forEach(function(cluster) {
        var fdSub = cluster.faceIndices.map(function(gi) {
            return flowData[gi] || { res: 0, energy: 0, vx: 0, vz: 0, p: 0 };
        });
        cluster._flowData = fdSub;
        cluster.dirty     = true;
        MNetNanite.clusterEnergy(cluster);
    });
};

// ---------------------------------------------------------------------------
// ?I  SELECT ACTIVE CLUSTERS ? the Nanite cut
//
//  Recursive DAG traversal.  Returns the "cut" ? the minimal set of clusters
//  that covers all faces, where each cluster either:
//    (a) has energy < threshold  (converged: use this level, don't go deeper)
//    (b) has no children         (leaf: forced to use)
//
//  This is the physics-driven equivalent of Nanite's error-threshold cut.
//
//  threshold:  NS residual cutoff.  Typical converged run: ~0.0001.
//              Use 0.001 for a coarser cut, 0.00001 for maximum detail.
//
//  cameraHint (optional): { pos:[x,y,z] }  ? future use for distance-weighted
//              threshold modulation (closer = lower threshold = more detail).
//              Currently unused; pass null.
// ---------------------------------------------------------------------------

MNetNanite.selectActiveClusters = function(dag, threshold, cameraHint) {
    var active = [];

    function visit(cluster) {
        var e = MNetNanite.clusterEnergy(cluster);
        // If converged OR no children, use this cluster
        if (e < threshold || cluster.children.length === 0) {
            active.push(cluster);
            return;
        }
        // Otherwise recurse into children
        cluster.children.forEach(visit);
    }

    dag.roots.forEach(visit);
    return active;
};

// ---------------------------------------------------------------------------
// ?J  GET ACTIVE FACES ? the renderer's view
//
//  Returns a flat array of GK face objects ? the subset of all faces that
//  should be rendered / simulated at this threshold.
//
//  Drop this array wherever you'd use gkState.faces in the Three.js renderer.
// ---------------------------------------------------------------------------

MNetNanite.getActiveFaces = function(dag, threshold, cameraHint) {
    var clusters = MNetNanite.selectActiveClusters(dag, threshold, cameraHint);
    var out = [];
    // Deduplicate (a face can be in multiple clusters if hierarchy is imperfect)
    var seen = {};
    clusters.forEach(function(cluster) {
        cluster.faces.forEach(function(face, fi) {
            var key = cluster.faceIndices[fi];
            if (!seen[key]) { seen[key] = true; out.push(face); }
        });
    });
    return out;
};

// ---------------------------------------------------------------------------
// ?K  VALIDATE MONOTONIC ENERGY
//
//  The key invariant: for a fully converged region,
//    parent.energy >= child.energy   (residual decreases with refinement)
//
//  Violations mean the physics has produced turbulence at sub-cluster scale ?
//  a child cluster that is MORE energetic than its parent.  This is physically
//  meaningful: a "hot spot" under a converged surface.
//
//  Returns: array of violation objects, or empty array if monotone.
//    { parent, child, parentEnergy, childEnergy, delta }
// ---------------------------------------------------------------------------

MNetNanite.validateMonotonicEnergy = function(dag) {
    var violations = [];
    dag.allNodes.forEach(function(cluster) {
        var pe = MNetNanite.clusterEnergy(cluster);
        cluster.children.forEach(function(child) {
            var ce = MNetNanite.clusterEnergy(child);
            if (ce > pe + MNetNanite.ENERGY_EPSILON) {
                violations.push({
                    parent:       cluster,
                    child:        child,
                    parentEnergy: pe,
                    childEnergy:  ce,
                    delta:        ce - pe,
                    parentId:     cluster.id,
                    childId:      child.id,
                    level:        child.level,
                    anchor:       child.anchor
                });
            }
        });
    });
    return violations;
};

// ---------------------------------------------------------------------------
// ?L  DAG STATS ? for the convergence panel / push meter
// ---------------------------------------------------------------------------

MNetNanite.dagStats = function(dag) {
    var totalClusters = dag.allNodes.length;
    var totalFaces    = 0;
    var energyByLevel = {};
    var clustersByLevel = {};

    dag.allNodes.forEach(function(c) {
        totalFaces += c.faces.length;
        var lv = c.level;
        if (!energyByLevel[lv]) { energyByLevel[lv] = []; clustersByLevel[lv] = 0; }
        energyByLevel[lv].push(MNetNanite.clusterEnergy(c));
        clustersByLevel[lv]++;
    });

    var levels = {};
    Object.keys(energyByLevel).forEach(function(lv) {
        var arr  = energyByLevel[lv];
        var sum  = arr.reduce(function(a, b) { return a + b; }, 0);
        var max  = arr.reduce(function(a, b) { return Math.max(a, b); }, 0);
        levels[lv] = {
            clusters: clustersByLevel[lv],
            avgEnergy: sum / arr.length,
            maxEnergy: max
        };
    });

    // Monotonicity violations
    var violations = MNetNanite.validateMonotonicEnergy(dag);

    return {
        totalClusters:       totalClusters,
        totalFaces:          totalFaces,
        maxLevel:            dag.maxLevel,
        roots:               dag.roots.length,
        violations:          violations.length,
        violationDetails:    violations,
        levels:              levels,
        isMonotone:          violations.length === 0
    };
};

// ---------------------------------------------------------------------------
// ?M  CONVENIENCE: one-liner for integration into mnet_v6.html animate loop
//

//        ? MNetNanite.getActiveFaces(_nanite.dag, _nanite.threshold)
//        : S.faces;
//
//  Notes:
//    - On first call, buildClusterHierarchy runs (~1ms for 800 faces, ~5ms for 27K faces).
//    - On subsequent calls, updateEnergies is O(N) with no allocation.
//    - The threshold slider in PC edition maps directly to _nanite.threshold.
//    - Set _nanite.dirty = true after doRefine() to force DAG rebuild.
//
// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
// ?N  EXPORT
// ---------------------------------------------------------------------------

if (typeof module !== 'undefined' && module.exports) module.exports = MNetNanite;

  var totalF = gkState.faces.length;
  var mbEst = Math.round(totalF * 0.0005 * 100) / 100;
  document.getElementById('h-mb').textContent = mbEst.toFixed(1);
  
  // Sort faces by depth (painter's algorithm) + sub-pixel cull
  var sorted=[];
  var culled=0;
  for(var i=0;i<gkState.faces.length;i++){
    var f=gkState.faces[i];
    var c=centroid3(f.pts);
    var p=project(c);
    
    // PROJECT first vertex to estimate screen size
    var p0=project(f.pts[0]);
    var p1=project(f.pts[1]);
    var screenSize=Math.sqrt((p0.x-p1.x)*(p0.x-p1.x)+(p0.y-p1.y)*(p0.y-p1.y));
    
    // SUB-PIXEL CULL: if face edge < 0.5px on screen, skip
    if(screenSize<0.5){culled++;continue}
    
    // VIEWPORT CULL: if centroid way off screen, skip
    if(p.x<-200||p.x>W+200||p.y<-200||p.y>H+200){culled++;continue}
    
    // BACKFACE CULL: check screen-space winding order
    // Project 3 vertices, compute cross product -> if CW, face points away
    var pa=project(f.pts[0]),pb=project(f.pts[1]),pc=project(f.pts[2]);
    var cross=(pb.x-pa.x)*(pc.y-pa.y)-(pb.y-pa.y)*(pc.x-pa.x);
    if(cross<0){culled++;continue} // clockwise = back face = skip
    
    sorted.push({face:f,depth:p.z,screenSize:screenSize});
  }
  sorted.sort(function(a,b){return a.depth-b.depth});
  
  document.getElementById('h-drawn').textContent=sorted.length+'/'+totalF;
  
  // Draw only visible faces
  for(var si=0;si<sorted.length;si++){
    var f=sorted[si].face;
    var pts2d=[];
    for(var k=0;k<f.pts.length;k++) pts2d.push(project(f.pts[k]));
    
    var isPent=f.type==='pent';
    var depth01=Math.max(0,Math.min(1,(sorted[si].depth+2)/4));
    var alpha=0.15+depth01*0.5;
    var ss=sorted[si].screenSize;
    
    // Fill
    cx.beginPath();
    cx.moveTo(pts2d[0].x,pts2d[0].y);
    for(var k=1;k<pts2d.length;k++) cx.lineTo(pts2d[k].x,pts2d[k].y);
    cx.closePath();
    
    if(isPent){
      cx.fillStyle='rgba(193,74,59,'+alpha*0.4+')';
      cx.strokeStyle='rgba(255,105,180,'+alpha+')';
    } else {
      cx.fillStyle='rgba(0,40,60,'+alpha*0.3+')';
      cx.strokeStyle='rgba(0,180,255,'+alpha*0.6+')';
    }
    cx.fill();
    // Only stroke if face is big enough to see edges
    if(ss>2){cx.lineWidth=isPent?1.5:0.5;cx.stroke()}
    
    // Vertices: only if face is large enough
    if(cam.atom>0.2&&ss>5){
      for(var k=0;k<pts2d.length;k++){
        var r=cam.atom*(isPent?2:1.2);
        cx.fillStyle=isPent?'rgba(255,105,180,'+alpha+')':'rgba(0,255,213,'+alpha*0.6+')';
        cx.beginPath();cx.arc(pts2d[k].x,pts2d[k].y,r,0,Math.PI*2);cx.fill();
      }
    }
  }
}

// ═══ OPERATIONS ═══
function doSeed(){
  M.group('SEED');
  M.seed();
  M.crystal();
  
  gkState = GK.buildC60();
  
  // Log every vertex and edge
  var inv = GK.invariants(gkState);
  M.P1({vertices:inv.vertices,reason:'dodecahedron vertices from golden ratio + phi'});
  M.P2({edges:inv.edges,reason:'trivalent connectivity, every vertex degree 3'});
  M.P7({faces:inv.faces,pents:inv.pents,hexes:inv.hexes,chi:inv.vertices-inv.edges+inv.faces});
  
  var check = checkInv();
  M.invariant(check);
  M.groupEnd('SEED');
  
  flRec('SEED',check);
  axLog('SEED: dodecahedron born','ax-inv');
  axLog('V='+check.V+' E='+check.E+' F='+check.F+' P='+check.pents+' chi='+check.chi,'ax-p7');
  updateHud(check);
}

function doRefineAll(){
  if(!gkState)return doSeed();
  M.group('REFINE_ALL');
  M.refine('ALL faces');
  var before=GK.invariants(gkState);
  
  M.P5({operation:'refineAll',facesBefore:before.faces});
  gkState=GK.refineAll(gkState,params);
  
  var check=checkInv();
  M.P6({aggregate:'centroid per face',count:before.faces});
  M.P1({innerNodes:before.faces,midNodes:before.faces});
  M.P2({innerEdges:before.faces,hexEdges:before.faces*6});
  M.P4({replaced:before.faces,created:check.F});
  M.P7({pentsAfter:check.pents,chi:check.chi,evRatio:check.evRatio});
  M.invariant(check);
  M.groupEnd('REFINE_ALL');
  
  flRec('REFINE_ALL',{before:before,after:check});
  axLog('REFINE ALL: '+before.faces+'F → '+check.F+'F','ax-p5');
  axLog('P='+check.pents+' chi='+check.chi+' E/V='+check.evRatio.toFixed(3),'ax-p7');
  updateHud(check);
}

function doRefinePents(){
  if(!gkState)return doSeed();
  M.group('REFINE_PENTS');
  M.refine('pentagons only');
  gkState=GK.refineAllPents(gkState,params);
  var check=checkInv();
  M.invariant(check);
  M.groupEnd('REFINE_PENTS');
  flRec('REFINE_PENTS',check);
  axLog('REFINE 5s: P='+check.pents+' F='+check.F,'ax-p6');
  updateHud(check);
}

function doRefineHexes(){
  if(!gkState)return doSeed();
  M.group('REFINE_HEXES');
  M.refine('hexagons only');
  gkState=GK.refineAllHexes(gkState,params);
  var check=checkInv();
  M.invariant(check);
  M.groupEnd('REFINE_HEXES');
  flRec('REFINE_HEXES',check);
  axLog('REFINE 6s: P='+check.pents+' F='+check.F,'ax-p4');
  updateHud(check);
}

function doUndo(){
  if(!gkState)return;
  gkState=GK.undo(gkState);
  var check=checkInv();
  flRec('UNDO',check);
  axLog('UNDO','ax-p3');
  updateHud(check);
}

// ═══ INVARIANT CHECK ═══
function checkInv(){
  if(!gkState)return{V:0,E:0,F:0,chi:0,pents:0,hexes:0,evRatio:0};
  var inv=GK.invariants(gkState);
  var chi=inv.vertices-inv.edges+inv.faces;
  return{V:inv.vertices,E:inv.edges,F:inv.faces,chi:chi,
    pents:inv.pents,hexes:inv.hexes,maxLevel:inv.maxLevel,
    evRatio:inv.vertices>0?inv.edges/inv.vertices:0};
}

// ═══ HUD ═══
function updateHud(c){
  document.getElementById('h-v').textContent=c.V;
  document.getElementById('h-e').textContent=c.E;
  document.getElementById('h-f').textContent=c.F;
  document.getElementById('h-p').textContent=c.pents;
  document.getElementById('h-h').textContent=c.hexes;
  document.getElementById('h-chi').textContent=c.chi;
  document.getElementById('h-ev').textContent=c.evRatio.toFixed(3);
  document.getElementById('h-lv').textContent=c.maxLevel||0;
  document.getElementById('h-ops').textContent=M._c;
  var el=document.getElementById('euler');
  if(c.pents===12&&c.chi===2) el.innerHTML='<span class="ok">V-E+F=2 · P=12 · E/V='+c.evRatio.toFixed(3)+'</span>';
  else el.innerHTML='<span class="bad">P='+c.pents+' χ='+c.chi+' BROKEN</span>';
}
function clearHud(){['h-v','h-e','h-f','h-p','h-h','h-chi','h-ev','h-lv'].forEach(function(id){document.getElementById(id).textContent='-'})}

function axLog(msg,cls){
  var el=document.getElementById('axiom-log');
  var d=document.createElement('div');d.className=cls||'';d.textContent=msg;
  el.insertBefore(d,el.firstChild);
  if(el.children.length>50)el.removeChild(el.lastChild);
}

  cam.ry+=(e.clientX-lastMouse.x)*0.005;

},{passive:false});

// MOBIUSIFY ENGINE: Sphere to Mobius strip
// chi: 2 to 0. Remove 2 antipodal faces, half-twist.
var MOB={active:false,t:0,spherePos:null,mobiusPos:null,R:2.5,W:0.8};

function sphereToMobius(pt,R,W){
  var x=pt[0],y=pt[1],z=pt[2];
  var r=Math.sqrt(x*x+y*y+z*z);if(r<1e-10)return[R,0,0];
  var theta=Math.atan2(y,x),phi=Math.acos(Math.max(-1,Math.min(1,z/r)));
  var u=theta+Math.PI,v=(phi/Math.PI-0.5)*2*W;
  return[(R+v*Math.cos(u/2))*Math.cos(u),(R+v*Math.cos(u/2))*Math.sin(u),v*Math.sin(u/2)];
}

function computeMobiusPositions(){
  MOB.spherePos=[];MOB.mobiusPos=[];
  for(var i=0;i<gkState.faces.length;i++){
    var f=gkState.faces[i],sp=[],mp=[];
    for(var k=0;k<f.pts.length;k++){sp.push(f.pts[k].slice());mp.push(sphereToMobius(f.pts[k],MOB.R,MOB.W));}
    MOB.spherePos.push(sp);MOB.mobiusPos.push(mp);
  }
  M.P4({transform:'sphere->mobius',faces:gkState.faces.length,chi:'2->0'});
}

function applyMobiusLerp(t){
  if(!MOB.spherePos||!MOB.mobiusPos)return;
  for(var i=0;i<gkState.faces.length;i++){
    var f=gkState.faces[i],sp=MOB.spherePos[i],mp=MOB.mobiusPos[i];
    if(!sp||!mp)continue;
    for(var k=0;k<f.pts.length;k++){
      f.pts[k][0]=sp[k][0]*(1-t)+mp[k][0]*t;
      f.pts[k][1]=sp[k][1]*(1-t)+mp[k][1]*t;
      f.pts[k][2]=sp[k][2]*(1-t)+mp[k][2]*t;
    }
  }
}

function toggleMobius(){
  if(!gkState)return;
  var btn=document.getElementById('bMob'),sl=document.getElementById('mobSlider');
  if(MOB.active){
    MOB.active=false;MOB.t=0;btn.style.background='';sl.disabled=true;sl.value=0;
    document.getElementById('twistVal').textContent='0.00';
    document.getElementById('mobState').textContent='off';
    if(MOB.spherePos){for(var i=0;i<gkState.faces.length;i++){
      var f=gkState.faces[i],sp=MOB.spherePos[i];
      if(sp)for(var k=0;k<f.pts.length;k++)f.pts[k]=sp[k].slice();
    }}
    MOB.spherePos=null;MOB.mobiusPos=null;
    console.log('%c MOBIUS OFF: sphere restored, chi=2','color:#ff69b4;font-size:12px');
    axLog('MOBIUS OFF: chi=2 restored','ax-p4');
    return;
  }
  MOB.active=true;btn.style.background='#3a0020';sl.disabled=false;
  document.getElementById('mobState').textContent='on';
  computeMobiusPositions();
  console.log('%c MOBIUS ON: chi 2->0, drag slider','color:#ff69b4;font-size:14px');
  console.log('%c  Sphere chi=2 -> Mobius chi=0','color:#ff69b4');
  console.log('%c  12 pentagons -> 10 (2 become the twist)','color:#ff69b4');
  axLog('MOBIUS ON: chi=2->0, twist slider active','ax-p6');
  flRec('MOBIUS_ON',{faces:gkState.faces.length});
}

function setMobiusTwist(v){
  var t=parseInt(v)/100;MOB.t=t;
  document.getElementById('twistVal').textContent=t.toFixed(2);
  if(!MOB.active)return;
  applyMobiusLerp(t);
  flRec('MOBIUS_TWIST',{t:t});
}

// INSIDE VIEW -- enter the sphere
// Stop time. Transport to center. Locked slow rotation.

// ============================================================
var _insideMode = false;
var _savedCam = null;
var _surfaceR = 0;  // sphere surface radius for inside-cam mode

function toggleInsideView() {
  var btn = document.getElementById('btn-enter');
  var wrap = document.getElementById('sl-inside-wrap');
  if (!_insideMode) {
    // ENTER -- save current state
    _savedCam = {
      zoom: cam.zoom,
      spin: cam.spin,
      rx: cam.rx,
      ry: cam.ry
    };
    // Stop spin
    cam.spin = 0;
    var spinEl = document.getElementById('sl-spin');
    if (spinEl) { spinEl.value = 0; SV('sv-spin', '0.000'); }
    // Set inside zoom
    var targetZoom = +document.getElementById('sl-inside').value;
    cam.zoom = targetZoom;
    var zmEl = document.getElementById('sl-zm');
    if (zmEl) { zmEl.value = Math.min(1500, targetZoom); SV('sv-zm', targetZoom); }
    // Surface camera: place cam ON sphere, looking inward
    _surfaceR = +document.getElementById('sl-inside').value;  // 0.5=deep inside, 1.6=surface, 5=just inside
    cam.rx = 0.3;   // slight tilt -- faces fill the view naturally
    // Fracyclic: gentle auto-rotation along surface
    cam.spin = 0.0008;
    // UI
    btn.textContent = 'EXIT';
    btn.classList.add('inside');
    btn.classList.remove('gn');
    wrap.style.display = 'flex';
    _insideMode = true;
    console.log('[GF] INSIDE VIEW -- zoom=' + targetZoom);
  } else {
    // EXIT -- restore
    if (_savedCam) {
      cam.zoom = _savedCam.zoom;
      cam.spin = _savedCam.spin;
      cam.rx   = _savedCam.rx;
      cam.ry   = _savedCam.ry;
      var zmEl = document.getElementById('sl-zm');
      if (zmEl) { zmEl.value = Math.min(1500, Math.round(_savedCam.zoom)); SV('sv-zm', Math.round(_savedCam.zoom)); }
      var spinEl = document.getElementById('sl-spin');
      if (spinEl) { spinEl.value = Math.round(_savedCam.spin * 1000); SV('sv-spin', _savedCam.spin.toFixed(3)); }
    }
    btn.textContent = 'ENTER';
    btn.classList.remove('inside');
    btn.classList.add('gn');
    wrap.style.display = 'none';
    _insideMode = false;
    _surfaceR = 0;
    console.log('[GF] EXIT -- cam restored');
  }
}

function setInsideZoom(val) {
  SV('sv-inside', val);
  if (_insideMode) {
    _surfaceR = val;  // slider = distance from center = surface radius
    // keep cam.zoom fixed for perspective scale
  }
}
